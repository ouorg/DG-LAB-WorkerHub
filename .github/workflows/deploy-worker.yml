name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install locked dependencies
        run: npm ci

      - name: Generate deployment configuration from repository secrets
        env:
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
          HUB_KV_NAMESPACE_ID: ${{ secrets.HUB_KV_NAMESPACE_ID }}
          HUB_KV_PREVIEW_NAMESPACE_ID: ${{ secrets.HUB_KV_PREVIEW_NAMESPACE_ID }}
          ASSETS_BUCKET_NAME: ${{ secrets.ASSETS_BUCKET_NAME }}
          ARCHIVE_BUCKET_NAME: ${{ secrets.ARCHIVE_BUCKET_NAME }}
          SESSION_TTL_SECONDS: ${{ secrets.SESSION_TTL_SECONDS }}
          SOCKET_PULSE_INTERVAL_MS: ${{ secrets.SOCKET_PULSE_INTERVAL_MS }}
          HEARTBEAT_INTERVAL: ${{ secrets.HEARTBEAT_INTERVAL }}
          WORKER_NAME: ${{ secrets.WORKER_NAME }}
        run: ./scripts/prepare-ci-config.sh

      - name: Run unit tests
        run: npm test

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Validate generated deployment configuration
        run: npm exec wrangler deploy -- --dry-run --config .wrangler-ci.toml --secrets-file .wrangler-ci-secrets.json

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.95.0"
          command: d1 migrations apply DB --remote --config .wrangler-ci.toml

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.95.0"
          command: deploy --config .wrangler-ci.toml --secrets-file .wrangler-ci-secrets.json

      - name: Remove temporary secret files
        if: always()
        run: rm -f .wrangler-ci.toml .wrangler-ci-secrets.json
