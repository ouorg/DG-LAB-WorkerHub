name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate, initialize, build, and deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
      HUB_KV_NAMESPACE_ID: ${{ secrets.HUB_KV_NAMESPACE_ID }}
      HUB_KV_PREVIEW_NAMESPACE_ID: ${{ secrets.HUB_KV_PREVIEW_NAMESPACE_ID }}
      ASSETS_BUCKET_NAME: ${{ secrets.ASSETS_BUCKET_NAME }}
      ARCHIVE_BUCKET_NAME: ${{ secrets.ARCHIVE_BUCKET_NAME }}
      SESSION_TTL_SECONDS: ${{ secrets.SESSION_TTL_SECONDS }}
      SOCKET_PULSE_INTERVAL_MS: ${{ secrets.SOCKET_PULSE_INTERVAL_MS }}
      HEARTBEAT_INTERVAL: ${{ secrets.HEARTBEAT_INTERVAL }}
      WORKER_NAME: ${{ secrets.WORKER_NAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate Actions workflow structure
        run: npm run actions:validate

      - name: Run unit tests
        run: npm test

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Migrate, initialize, validate, build, and deploy Worker
        run: ./scripts/deploy-worker.sh

      - name: Remove temporary deployment files
        if: always()
        run: rm -rf .wrangler-ci.toml .wrangler-ci-secrets.json dist/worker-upload
