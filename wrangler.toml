name = "dg-lab-worker-hub"
main = "src/worker.ts"
compatibility_date = "2026-05-30"

[secrets]
required = ["LOGIN_PASSWORD"]

[[kv_namespaces]]
binding = "HUB_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

[[durable_objects.bindings]]
name = "DEVICE_DO"
class_name = "DeviceDurableObject"

[[durable_objects.bindings]]
name = "SOCKET_V2_DO"
class_name = "SocketV2DurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DeviceDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SocketV2DurableObject"]
